name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend (lint & test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: recipe_user
          POSTGRES_PASSWORD: recipe_pass
          POSTGRES_DB: recipe_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U recipe_user"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest --break-system-packages || pip install ruff pytest

      - name: Lint with ruff
        run: ruff check .

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://recipe_user:recipe_pass@localhost:5432/recipe_db
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://recipe_user:recipe_pass@localhost:5432/recipe_db
        run: pytest

  frontend:
    name: Frontend (lint & test)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test -- --run

      - name: Build
        run: npm run build